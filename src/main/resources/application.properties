# ===========================================================
# Application properties – H2 in-memory database
# ===========================================================
spring.application.name=football-confederation

# Datasource – H2 in-memory
spring.datasource.url=jdbc:h2:mem:footballdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Jackson: ISO-8601 dates
spring.jackson.serialization.write-dates-as-timestamps=false

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# JWT
app.jwt.secret=${APP_JWT_SECRET:ThisIsAVeryLongAndSecureSecretKeyForJWTSigningThatIsAtLeast256BitsLong!}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:10800000}
